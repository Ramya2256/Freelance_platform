{% extends 'base.html' %}

{% block title %}Apply for {{ job.title }}{% endblock %}

{% block content %}
<div class="apply-form-container" style="max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: 1rem; border: 1px solid var(--border);">
    <h2 style="margin-bottom: 1rem;">Submit Proposal</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Applying for: <strong>{{ job.title }}</strong></p>
    
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Your Proposal</label>
            <textarea name="proposal" required style="width: 100%; min-height: 150px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--text);"></textarea>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Expected Budget ($)</label>
            <input type="number" name="budget" required step="0.01" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--text);">
        </div>
        
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Portfolio Link (Optional)</label>
            <input type="url" name="portfolio_link" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--text);">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Submit Application</button>
            <a href="{% url 'job_detail' job.id %}" class="btn" style="flex: 1; text-align: center; border: 1px solid var(--border);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
